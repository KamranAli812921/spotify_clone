<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spotify_clone</title>
    <link rel="stylesheet" href="dark-scrol-bar.css" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="utility.css" />
  </head>
  <body>
    <div class="container flex">
      <div class="left">
        <div class="home rounded m-1 bg-grey">
          <div class="logo">
            <img src="logo.svg" alt="Logo" />
            Spotify
          </div>
          <ul>
            <li><img src="home.svg" alt="Home" /> Home</li>
            <li><img src="search.svg" alt="Search" /> Search</li>
          </ul>
        </div>

        <div class="library m-1 rounded bg-grey">
          Your Library
          <div class="playlist">
            <ul>
              
            </ul>
          </div>
          <div class="footer">
            <a href="https://www.spotify.com/pk-en/legal/">
              <span>Legal</span>
            </a>
            <a href="https://www.spotify.com/pk-en/legal/privacy-policy/">
              <span>Privacy Policy</span>
            </a>

            <a href="https://www.spotify.com/pk-en/legal/cookies-policy/">
              <span>Cookies</span>
            </a>

            <a href="https://www.spotify.com/pk-en/legal/privacy-policy/#s3">
              <span>About Ads</span>
            </a>
            <a href="https://www.spotify.com/pk-en/accessibility/">
              <span>Accessibility</span>
            </a>
          </div>
        </div>
      </div>
      <div class="right rounded bg-grey">
        <div class="header">
          <div class="nav">
            <img src="less-than.svg" alt="less-Then" />
            <img src="greater-than.svg" alt="Greater-Then" />
          </div>
          <div class="bottons">
            <button class="signupbtn btn">Sign Up</button>
            <button class="loginbtn btn">Log in</button>
          </div>
        </div>
        <div class="spotify-playlist">
          <h1>Spotify Playlist</h1>
          <div class="card-container">
            <div class="card">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="60"
                height="60"
                viewBox="0 0 100 100"
                class="play"
              >
                <!-- Green circular background -->
                <circle cx="50" cy="50" r="45" fill="#1ED760" />
                <!-- White play icon with padding -->
                <path d="M40 30 L40 70 L72 50 Z" fill="white" />
              </svg>
              <img src="Hum tum.jpg" alt="" />
              <h2>Hum tum</h2>
              <p>
                Lorem ipsum dolor sit amet consectetur, adipisicing elit. Eos,
                harum.
              </p>
            </div>
            <div class="card">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="60"
                height="60"
                viewBox="0 0 100 100"
                class="play"
              >
                <!-- Green circular background -->
                <circle cx="50" cy="50" r="45" fill="#1ED760" />
                <!-- White play icon with padding -->
                <path d="M40 30 L40 70 L72 50 Z" fill="white" />
              </svg>
              <img src="Hum tum.jpg" alt="" />
              <h2>Hum tum</h2>
              <p>
                Lorem ipsum dolor sit amet consectetur, adipisicing elit. Eos,
                harum.
              </p>
            </div>
          </div>
          <div class="playbar">
            <div class="playbtn">
              <img src="previous.svg" alt="" class="next" />
              <img src="play-button.svg" alt="" class="next" />
              <img src="next.svg" alt="" class="next" />
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="scripts.js"></script>
  </body>
</html>
