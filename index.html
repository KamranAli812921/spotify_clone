<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spotify_clone</title>
    <link rel="stylesheet" href="dark-scrol-bar.css" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="utility.css" />
    <link rel="icon" href="logo.svg" type="image/svg+xml">
  </head>
  <body>
    <div class="container flex">
      <div class="left">
        <div class="close"><img src="close.svg" alt=""></div>
        <div class="home rounded m-1 bg-grey">
          <div class="logo">
            <img src="logo.svg" alt="Logo" />
            Spotify
          </div>
          <ul>
            <li><img src="home.svg" alt="Home" /> Home</li>
            <li><img src="search.svg" alt="Search" /> Search</li>
          </ul>
        </div>

        <div class="library m-1 rounded bg-grey">
          Your Library
          <div class="playlist">
            <ul>
              
            </ul>
          </div>
          <div class="footer">
            <a href="https://www.spotify.com/pk-en/legal/">
              <span>Legal</span>
            </a>
            <a href="https://www.spotify.com/pk-en/legal/privacy-policy/">
              <span>Privacy Policy</span>
            </a>

            <a href="https://www.spotify.com/pk-en/legal/cookies-policy/">
              <span>Cookies</span>
            </a>

            <a href="https://www.spotify.com/pk-en/legal/privacy-policy/#s3">
              <span>About Ads</span>
            </a>
            <a href="https://www.spotify.com/pk-en/accessibility/">
              <span>Accessibility</span>
            </a>
          </div>
        </div>
      </div>
      <div class="right rounded bg-grey">
        <div class="header">
          <div class="nav">
          
            <img class="hamburger" src="hamburgur.svg" alt="">
            <img src="less-than.svg" alt="less-Then" />
            <img src="greater-than.svg" alt="Greater-Then" />
          </div>
          <div class="bottons">
            <button class="signupbtn btn">Sign Up</button>
            <button class="loginbtn btn">Log in</button>
          </div>
        </div>
        <div class="spotify-playlist">
          <h1>Spotify Playlist</h1>
          <div class="card-container">
           
          </div>
          
        </div>
        <div class="playbar">

          <div class="infobar">
            <div class="songinfo"></div>
            <div class="playbtn">
              <img id="previous" src="previous.svg" alt="" class="previos" />
              <img id="play" src="play-button.svg" alt="" class="next" />
              <img id="next" src="next.svg" alt="" class="next" />
            </div>
            <div class="volumebtn">
              <div class="songtime">
                
              </div>
              <div class="volume"><img src="volume.svg" alt="">
                <div class="range">
                  <input type="range" name="volume" min="0" max="100" id="volumeside" value="50">
                </div>
              </div>
            </div>
              
            
          </div>

          <div class="seekbar">
            <div class="circle"></div></div>
    </div>
    <script src="scripts.js"></script>
  </body>
</html>
